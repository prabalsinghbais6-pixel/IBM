<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Josh AI — Chat</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    html, body { overflow: hidden; }

    /* Loading overlay */
    #chat-loading {
      position: absolute; inset: 0;
      background: var(--bg);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 16px; z-index: 10;
      transition: opacity .4s ease;
    }
    #chat-loading.hidden { opacity: 0; pointer-events: none; }
    #chat-loading p { font-size: 14px; color: var(--muted); margin: 0; }

    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .chat-status-bar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 6px 28px;
      display: flex; align-items: center; gap: 10px;
      font-size: 12.5px; color: var(--muted);
    }
    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--green);
    }
    .chat-status-bar .agent-label { color: var(--text); font-weight: 600; }

    #chat-embed-container {
      flex: 1; width: 100%;
      position: relative; overflow: hidden;
    }
    #root { width: 100%; height: 100%; }
  </style>
</head>
<body>

<!-- ── Topbar ─────────────────────────────────────────── -->
<header class="topbar">
  <a href="index.html" class="topbar-brand">
    <span class="logo-dot">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <circle cx="7" cy="7" r="5" stroke="#0d1117" stroke-width="2.5"/>
        <circle cx="7" cy="7" r="2" fill="#0d1117"/>
      </svg>
    </span>
    Josh AI
  </a>
  <nav class="topbar-nav">
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
  </nav>
  <a href="index.html" class="topbar-cta">← Back</a>
</header>

<!-- ── Chat layout ────────────────────────────────────── -->
<div class="chat-page">

  <div class="chat-status-bar">
    <span class="status-dot"></span>
    <span>Connected to</span>
    <span class="agent-label">Josh</span>
    <span style="margin-left:auto;">IBM watsonx Orchestrate</span>
  </div>

  <div id="chat-embed-container">
    <div id="chat-loading">
      <div class="spinner"></div>
      <p>Connecting to Josh…</p>
    </div>
    <div id="root"></div>
  </div>

</div>

<!-- ── Nav highlight ──────────────────────────────────── -->
<script src="static/js/josh.js"></script>

<!-- ── wxO embed — inline, no module, no fetch ───────── -->
<script>
  // Step 1: set config before loader runs
  window.wxOConfiguration = {
    orchestrationID:    "b28841a69dd94fbd864a9a1a71be5b97_858456c8-9a38-4876-93fb-6b4672c5c391",
    hostURL:            "https://us-south.watson-orchestrate.cloud.ibm.com",
    rootElementID:      "root",
    showLauncher:       false,
    deploymentPlatform: "ibmcloud",
    crn:                "crn:v1:bluemix:public:watsonx-orchestrate:us-south:a/b28841a69dd94fbd864a9a1a71be5b97:858456c8-9a38-4876-93fb-6b4672c5c391::",
    chatOptions: {
      agentId: "d3a52aa8-1a1f-45d1-a42d-1ea0595b01c7"
    },
    layout: {
      form: "fullscreen-overlay",
      showOrchestrateHeader: true
    }
  };

  // Step 2: hide loader — either when wxO mounts content or after 8s timeout
  function hideLoader() {
    var el = document.getElementById("chat-loading");
    if (el) el.classList.add("hidden");
  }

  var fallbackTimer = setTimeout(hideLoader, 8000);

  var root = document.getElementById("root");
  var observer = new MutationObserver(function () {
    if (root && root.childElementCount > 0) {
      clearTimeout(fallbackTimer);
      observer.disconnect();
      setTimeout(hideLoader, 400);
    }
  });
  observer.observe(root, { childList: true, subtree: true });

  // Step 3: inject wxoLoader
  var script = document.createElement("script");
  script.src = window.wxOConfiguration.hostURL + "/wxochat/wxoLoader.js?embed=true";
  script.onload = function () {
    if (typeof wxoLoader !== "undefined") {
      wxoLoader.init();
    } else {
      hideLoader();
    }
  };
  script.onerror = function () {
    clearTimeout(fallbackTimer);
    observer.disconnect();
    document.getElementById("chat-embed-container").innerHTML =
      '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;'
      + 'height:100%;gap:14px;font-family:-apple-system,Segoe UI,sans-serif;">'
      + '<svg width="40" height="40" viewBox="0 0 40 40" fill="none">'
      + '<circle cx="20" cy="20" r="18" stroke="#f85149" stroke-width="2"/>'
      + '<path d="M20 12v10M20 26v2" stroke="#f85149" stroke-width="2.5" stroke-linecap="round"/>'
      + '</svg>'
      + '<p style="color:#e6edf3;font-size:15px;font-weight:600;margin:0">Could not load Josh</p>'
      + '<p style="color:#8b949e;font-size:13px;max-width:340px;text-align:center;margin:0">'
      + 'Failed to reach IBM watsonx Orchestrate. Check your internet connection and try again.'
      + '</p>'
      + '<a href="index.html" style="margin-top:8px;padding:9px 22px;background:#58a6ff;'
      + 'color:#0d1117;border-radius:8px;font-weight:600;font-size:14px;text-decoration:none;">'
      + '← Back to home</a></div>';
  };
  document.head.appendChild(script);
</script>

</body>
</html>
